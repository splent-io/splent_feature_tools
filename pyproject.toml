[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_tools"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.13"

dependencies = [

]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

[tool.splent]
cli_version = "1.11.0"

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "Tools — research/SPL tools (public list grouped by status + detail, admin CRUD)"

[tool.splent.contract.provides]
routes     = ["/admin/tools", "/admin/tools/<int:tool_id>/delete", "/admin/tools/<int:tool_id>/edit", "/admin/tools/<int:tool_id>/move", "/admin/tools/new", "/tools", "/tools/<slug>"]
blueprints = []
models     = ["Tool"]
commands   = ["hello"]
hooks      = ["layout.authenticated_sidebar"]
services   = ["ToolsService"]
signals    = []
translations = ["es"]
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = []
signals  = []

[tool.splent.contract.extensible]
services  = ["ToolsService"]
templates = ["tools/admin/form.html", "tools/admin/list.html", "tools/detail.html", "tools/list.html"]
models    = ["Tool"]
hooks     = ["layout.authenticated_sidebar"]
routes    = false
